<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>证书</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html{scroll-behavior:smooth;}
        body{background:#f5f5f5;padding:40px 20px;}
        .box{
            max-width:900px;
            margin:0 auto;
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:24px;
        }
        .item{
            background:#fff;
            border-radius:8px;
            padding:12px;
        }
        .item img{
            width:100%;
            height:320px;
            object-fit:contain;
            display:block;
        }
    </style>
</head>
<body>
<div class="box">
    <div class="item"><img src="cert1.jpg"></div>
    <div class="item"><img src="cert2.jpg"></div>
    <div class="item"><img src="cert3.jpg"></div>
    <div class="item"><img src="cert4.jpg"></div>
    <div class="item"><img src="cert5.jpg"></div>
    <div class="item"><img src="cert6.jpg"></div>
</div>
</body>
</html>
